server:
  port: 8081

spring:
  application:
    name: library-system
  datasource:
    url: jdbc:mysql://localhost:3306/library_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  jackson:
    time-zone: Asia/Shanghai

security:
  jwt:
    secret: ${JWT_SECRET:library-system-jwt-secret-key-2026-change-me-at-least-32-bytes}
    expiration-seconds: 86400

recommendation:
  overdue-days: 14
  default-top-n: 10
  max-top-n: 50
  remote-score-url: ${RECOMMEND_SCORE_API_URL:}
  remote-score-api-key: ${RECOMMEND_SCORE_API_KEY:}
  remote-timeout-ms: 6000

deepseek:
  api-url: https://api.deepseek.com/v1/chat/completions
  api-key: ${DEEPSEEK_API_KEY:}
  model: deepseek-chat

file:
  upload-dir: uploads/book-covers
  max-image-size-mb: 2
